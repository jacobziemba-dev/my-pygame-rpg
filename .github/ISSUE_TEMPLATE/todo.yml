name: "TODO Task"
description: A small, actionable task completable in 1–3 sessions.
labels: ["type:todo"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for concrete, short tasks. Aim to complete in **1–3 sessions**.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What needs to be done? Be specific.
      placeholder: "e.g. Add attack animation for player sprite"
    validations:
      required: true

  - type: textarea
    id: definition_of_done
    attributes:
      label: Definition of Done
      description: How do you know this task is complete?
      placeholder: |
        - [ ] Animation plays when attack input is received
        - [ ] No regressions in existing movement animations
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - Attack animation loops correctly
        - Frame timing matches design spec
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Notes / Context
      description: Any extra context, links, or references.
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "priority:high"
        - "priority:med"
        - "priority:low"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "area:combat"
        - "area:ui"
        - "area:map"
        - "area:quests"
        - "area:other"
    validations:
      required: false
