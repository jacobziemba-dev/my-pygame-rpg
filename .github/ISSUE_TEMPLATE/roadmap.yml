name: "Roadmap / Epic"
description: A bigger planned feature or epic that may span multiple sessions or milestones.
labels: ["type:roadmap"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for epics and larger features. Break them into TODO child issues when ready to implement.

  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: "e.g. Players have no way to track quest progress, making the game feel directionless."
    validations:
      required: true

  - type: textarea
    id: user_story
    attributes:
      label: User Story
      description: Who benefits and how?
      placeholder: "As a player, I want to see active quests and objectives so that I know what to do next."
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: In Scope
      description: What will be built as part of this epic?
      placeholder: |
        - Quest log UI panel
        - Quest acceptance / completion events
        - Persist quest state between sessions
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope
      description: What is explicitly NOT included in this epic?
      placeholder: |
        - Quest branching / dialogue trees (separate epic)
        - Multiplayer quest sync
    validations:
      required: false

  - type: textarea
    id: child_issues
    attributes:
      label: Child Issues / Tasks
      description: Link TODO issues that belong to this epic.
      placeholder: |
        - [ ] #12 Add quest log data model
        - [ ] #13 Build quest log UI panel
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Notes / References
      description: Design docs, mockups, related issues or PRs.
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "priority:high"
        - "priority:med"
        - "priority:low"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "area:combat"
        - "area:ui"
        - "area:map"
        - "area:quests"
        - "area:other"
    validations:
      required: false
