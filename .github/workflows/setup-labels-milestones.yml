name: Setup Labels and Milestones

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: "type:todo",          color: "0075ca", description: "Concrete task completable in 1-3 sessions" },
              { name: "type:roadmap",        color: "e4e669", description: "Bigger planned item or epic" },
              { name: "priority:high",       color: "d73a4a", description: "High priority" },
              { name: "priority:med",        color: "e4b429", description: "Medium priority" },
              { name: "priority:low",        color: "0e8a16", description: "Low priority" },
              { name: "status:blocked",      color: "b60205", description: "Blocked by something else" },
              { name: "status:in-progress",  color: "fbca04", description: "Actively being worked on" },
              { name: "area:combat",         color: "c5def5", description: "Combat system" },
              { name: "area:ui",             color: "c5def5", description: "User interface" },
              { name: "area:map",            color: "c5def5", description: "Map / world" },
              { name: "area:quests",         color: "c5def5", description: "Quest system" },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label,
                });
                console.log(`Created label: ${label.name}`);
              } catch (e) {
                if (e.status === 422) {
                  // Already exists — update it
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ...label,
                  });
                  console.log(`Updated label: ${label.name}`);
                } else {
                  throw e;
                }
              }
            }

      - name: Create milestones
        uses: actions/github-script@v7
        with:
          script: |
            const milestones = [
              { title: "v0.1 Prototype",    description: "Basic playable prototype — movement, map, simple combat" },
              { title: "v0.2 Core Loop",    description: "Complete game loop — quests, inventory, save/load" },
              { title: "v0.3 Content Pass", description: "Additional maps, enemies, quests, and polish" },
              { title: "v1.0",              description: "Release-ready — full content, bug-free, polished" },
            ];

            // Fetch existing milestones to avoid duplicates
            const existing = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all",
              per_page: 100,
            });
            const existingTitles = new Set(existing.data.map(m => m.title));

            for (const milestone of milestones) {
              if (existingTitles.has(milestone.title)) {
                console.log(`Milestone already exists: ${milestone.title}`);
              } else {
                await github.rest.issues.createMilestone({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...milestone,
                });
                console.log(`Created milestone: ${milestone.title}`);
              }
            }
